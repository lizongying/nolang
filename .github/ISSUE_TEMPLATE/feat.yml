name: Feature Request
description: Propose a new feature or improvement for Nolang
title: "feat: "
labels: ["feature"]
body:
  - type: markdown
    attributes:
      value: Please describe your feature request clearly in detail.

  - type: textarea
    id: feature-description
    attributes:
      label: Feature Description
      description: What feature or improvement would you like to see?
      placeholder: Describe the feature you want to propose...
    validations:
      required: true

  - type: textarea
    id: use-case
    attributes:
      label: Use Case
      description: Why is this feature needed? What problem does it solve?
      placeholder: Explain the scenario, pain point or user demand...
    validations:
      required: true

  - type: textarea
    id: proposed-solution
    attributes:
      label: Proposed Solution
      description: How do you expect this feature to work?
      placeholder: Describe expected syntax, behavior or design...
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives Considered
      description: Other similar solutions you have thought about
      placeholder: Optional
    validations:
      required: false

  - type: textarea
    id: additional-info
    attributes:
      label: Additional Context
      description: Screenshots, examples, related references etc.
      placeholder: Optional
    validations:
      required: false